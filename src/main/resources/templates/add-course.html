<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Course</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .sidebar {
            height: 100vh;
            background: #212529;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .navbar {
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
        <h4 class="text-center text-white mb-4">🎓 SMS</h4>
        <a href="/dashboard">Dashboard</a>
        <a href="/students">Students</a>
        <a href="/add-student">Add Student</a>
        <a href="/add-course">Courses</a>
        <hr>
        <a href="/login">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10">

        <!-- Navbar -->
        <nav class="navbar p-3 mb-4">
            <span class="fw-bold">Add Course</span>
        </nav>

        <!-- Content -->
        <div class="container">

            <div class="card shadow p-4 col-md-6 mx-auto">

                <h5 class="mb-3 text-center">📚 Add New Course</h5>

                <!-- ✅ FIXED FORM -->
                <form action="/courses/form" method="post">

                    <div class="mb-3">
                        <label class="form-label">Course Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter course name" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Save Course</button>

                </form>

                <br>

                <a href="/dashboard" class="btn btn-outline-secondary w-100">Back</a>

            </div>

        </div>

    </div>

</div>
</div>

</body>
</html>
