<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }

        /* Cards */
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center mb-4">🎓 SMS</h4>

            <a href="/dashboard">Dashboard</a>
            <a href="/students">Students</a>
            <a href="/add-student">Add Student</a>
            <a href="/add-course">Courses</a>

            <hr>

            <a href="/login">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">

            <!-- Navbar -->
            <nav class="navbar p-3 mb-4">
                <span class="fw-bold">Dashboard</span>
                <span class="text-muted">Welcome, Admin</span>
            </nav>

            <!-- Content -->
            <div class="container">

                <div class="row">

                    <div class="col-md-4 mb-4">
                        <div class="card shadow p-4 text-center">
                            <h5>👨‍🎓 Students</h5>
                            <p class="text-muted">Manage students</p>
                            <a href="/students" class="btn btn-primary">View</a>
                        </div>
                    </div>

                    <div class="col-md-4 mb-4">
                        <div class="card shadow p-4 text-center">
                            <h5>➕ Add Student</h5>
                            <p class="text-muted">Create new student</p>
                            <a href="/add-student" class="btn btn-success">Add</a>
                        </div>
                    </div>

                    <div class="col-md-4 mb-4">
                        <div class="card shadow p-4 text-center">
                            <h5>📚 Courses</h5>
                            <p class="text-muted">Manage courses</p>
                            <a href="/add-course" class="btn btn-warning">Open</a>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
