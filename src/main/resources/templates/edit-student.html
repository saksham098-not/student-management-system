<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Edit Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }
.sidebar { height: 100vh; background: #212529; padding-top: 20px; }
.sidebar a { color: #adb5bd; display: block; padding: 12px; }
.sidebar a:hover { background: #343a40; color: white; }
.navbar { background: white; }
.card { border-radius: 12px; }
</style>
</head>

<body>
<div class="container-fluid">
<div class="row">

<div class="col-md-2 sidebar">
<h4 class="text-center text-white mb-4">🎓 SMS</h4>
<a href="/dashboard">Dashboard</a>
<a href="/students">Students</a>
<a href="/add-student">Add Student</a>
<a href="/add-course">Courses</a>
<hr>
<a href="/login">Logout</a>
</div>

<div class="col-md-10">
<nav class="navbar p-3 mb-4">
<span class="fw-bold">Edit Student</span>
</nav>

<div class="container">
<div class="card shadow p-4 col-md-6 mx-auto">

<form action="/users/update" method="post">

<input type="hidden" name="id" th:value="${user.id}">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" th:value="${user.username}" class="form-control">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control">
</div>

<button class="btn btn-warning w-100">Update</button>

</form>

<br>
<a href="/students" class="btn btn-outline-secondary w-100">Back</a>

</div>
</div>
</div>

</div>
</div>
</body>
</html>
