<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #adb5bd;
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #343a40;
            color: white;
        }

        .navbar {
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.05);
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
        <h4 class="text-center mb-4">🎓 SMS</h4>
        <a href="/dashboard">Dashboard</a>
        <a href="/students">Students</a>
        <a href="/add-student">Add Student</a>
        <a href="/add-course">Courses</a>
        <hr>
        <a href="/login">Logout</a>
    </div>

    <!-- Main -->
    <div class="col-md-10">

        <!-- Navbar -->
        <nav class="navbar p-3 mb-4">
            <span class="fw-bold">Students</span>
            <span class="text-muted">Admin Panel</span>
        </nav>

        <!-- Content -->
        <div class="container">

            <div class="card shadow p-4">

                <h5 class="mb-3">Students List</h5>

                <table class="table table-hover text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>

                            <td>
                                <a th:href="@{'/users/edit/' + ${user.id}}" class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{'/users/delete/' + ${user.id}}" class="btn btn-danger btn-sm">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-end">
                    <a href="/add-student" class="btn btn-primary">+ Add Student</a>
                </div>

            </div>

        </div>

    </div>

</div>
</div>

</body>
</html>
